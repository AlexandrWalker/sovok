<div class="callback callback-mini">
  <div class="callback__inner">

    <div class="general__head">
      <div class="general__suptitle">
        готовы
      </div>
      <div class="general__title">
        к запуску?
      </div>
    </div>

    <form class="form" action="">
      <div class="form-inner">
        <div class="form-body">
          <div class="form-group">
            <input id="callback_mini_name_input" class="form-input" type="text" name="names">
            <label class="form-label">
              <!-- Имя субъекта -->
              <div class="typewriter" data-sync-group="callback-mini" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#callback_mini_name_input" data-stop-text="Имя субъекта">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Давай знакомиться!|Сюда писать имя"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <input id="callback_mini_tel_input" class="form-input" type="tel" name="tel">
            <label class="form-label">
              <!-- КАНАЛ СВЯЗИ -->
              <div class="typewriter" data-sync-group="callback-mini" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#callback_mini_tel_input" data-stop-text="КАНАЛ СВЯЗИ">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Номер телефона|Можно указать почту|Ждем обращения)"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>
            </label>
          </div>
          <div class="form-group">
            <input id="callback_mini_comments_input" class="form-input" type="text" name="comments">
            <label class="form-label">
              <!-- СУТЬ ОБРАЩЕНИЯ -->
              <div class="typewriter" data-sync-group="callback-mini" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#callback_mini_comments_input" data-stop-text="СУТЬ ОБРАЩЕНИЯ">
                <div class="typewriter__line">
                  <span class="typewriter__word"
                    data-words="суть нашего разговора|главная идея моего сообщения|основная цель"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>
            </label>
          </div>
        </div>
        <div class="form-foot">
          <button class="form-btn" type="button" data-btn-sound="poehali">
            <div class="form-btn__text">
              поехали!
            </div>
          </button>
          <div class="form-wrap">
            <div class="form-text">
              Нажимая на кнопку «Отправить» вы соглашаетесь с <a href="/">Политикой обработки персональных данных</a>
            </div>
            <div class="form-group">
              <input id="form-checkbox-5" class="form-checkbox" type="checkbox" data-btn-sound="shutdown_sound">
              <label for="form-checkbox-5" class="form-checkbox-label">
                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на обработку персональных данных
                </div>
              </label>
            </div>
            <div class="form-group">
              <input id="form-checkbox-6" class="form-checkbox" type="checkbox" data-btn-sound="shutdown_sound">
              <label for="form-checkbox-6" class="form-checkbox-label">
                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на рекламные уведомления
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="request__cover" data-anim="parallax-shadow">
      <img class="request__cover-img request__cover-img--2" src="./../images/temp/request-cover-2.svg" alt="">
      <img class="request__cover-img request__cover-img--1" src="./../images/temp/request-cover-1.svg" alt="">
    </div>

  </div>
</div>
