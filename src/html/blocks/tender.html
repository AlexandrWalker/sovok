<div class="tender tender lenis" data-lenis-prevent>
  <div class="tender__inner">

    <div class="general__head">
      <div class="general__suptitle">
        пригласить
      </div>
      <div class="general__title">
        в тендер
      </div>
    </div>

    <form class="form" action="">
      <div class="form-inner">
        <div class="form-body form-col-2">
          <div class="form-group">
            <input id="tender_organization_input" class="form-input" type="text" name="tender_organization" required>
            <label class="form-label">
              <!-- организация -->

              <div class="typewriter" data-sync-group="tender" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#tender_organization_input" data-stop-text="Имя субъекта">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Давай знакомиться!|Сюда писать имя"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <div class="form-group">
            <input id="tender_gorod_input" class="form-input" type="text" name="tender_gorod" required>
            <label class="form-label">
              <!-- Город -->

              <div class="typewriter" data-sync-group="tender" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#tender_gorod_input" data-stop-text="Имя субъекта">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Давай знакомиться!|Сюда писать имя"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <div class="form-group">
            <input id="tender_tel_input" class="form-input" type="tel" name="tender_tel" required>
            <label class="form-label">
              <!-- Телефон  -->

              <div class="typewriter" data-sync-group="tender" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#tender_tel_input" data-stop-text="КАНАЛ СВЯЗИ">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Номер телефона|Можно указать почту|Ждем обращения)"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <div class="form-group">
            <input id="tender_email_input" class="form-input" type="email" name="tender_email" required>
            <label class="form-label">
              <!-- Электронная почта  -->

              <div class="typewriter" data-sync-group="tender" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#tender_email_input" data-stop-text="КАНАЛ СВЯЗИ">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Номер телефона|Можно указать почту|Ждем обращения)"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <div class="form-group">
            <input id="tender_comments_input" class="form-input" type="text" name="tender_comments" required>
            <label class="form-label">
              <!-- ссылка на тендер или комментарий -->

              <div class="typewriter" data-sync-group="tender" data-type-speed="0.07" data-type-variance="0.04"
                data-delete-speed="0.04" data-pause-after-type="2.0" data-pause-after-delete="0.5"
                data-input="#tender_comments_input" data-stop-text="СУТЬ ОБРАЩЕНИЯ">
                <div class="typewriter__line">
                  <span class="typewriter__word"
                    data-words="суть нашего разговора|главная идея моего сообщения|основная цель"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
        </div>
        <div class="form-foot">
          <button class="form-btn" type="button" data-btn-sound="poehali">
            <div class="form-btn__text">
              поехали!
            </div>
          </button>
          <div class="form-wrap">
            <div class="form-text">
              Нажимая на кнопку «Отправить» вы соглашаетесь с <a href="/">Политикой обработки персональных данных</a>
            </div>
            <div class="form-group">
              <input id="tender-form-checkbox-1" class="form-checkbox" type="checkbox" data-btn-sound="shutdown_sound">
              <label for="tender-form-checkbox-1" class="form-checkbox-label">
                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на обработку персональных данных
                </div>
              </label>
            </div>
            <div class="form-group">
              <input id="tender-form-checkbox-2" class="form-checkbox" type="checkbox" data-btn-sound="shutdown_sound">
              <label for="tender-form-checkbox-2" class="form-checkbox-label">
                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на рекламные уведомления
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>
    </form>

      <div class="tender__cover-img tender__cover-img--first" data-tender-anim="fadeUp">
        <img src="./../../images/temp/raketa.png" alt="">
      </div>
    </div> -->

      <span class="tender__btn-line tender__btn-line--first"></span>
      <span class="tender__btn-line tender__btn-line--second"></span>
    </div> -->

  </div>
</div>
