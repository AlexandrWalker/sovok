          <div class="form-group">

            </label>
          </div>
          <!-- <div class="form-group">
            <textarea class="form-textarea" rows="1" name="commentss"></textarea>

            </label>
          </div> -->

        <div class="form-foot">
          <button class="form-btn" type="button" data-btn-sound="poehali">

          <div class="form-wrap">

            </div>
            <div class="form-group">

                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на рекламные уведомления
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="callback__cover">
      <div class="callback__cover-img callback__cover-img--first" data-anim="fadeDown">
        <img src="./../../images/temp/callback-ruka.png" alt="">

      <div class="callback__cover-img callback__cover-img--second" data-anim="fadeUp">
