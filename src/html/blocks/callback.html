<div class="callback lenis" data-lenis-prevent>
  <div class="callback__side">
    <div class="callback__side-text">
      Мир. дружба. жвачка.
    </div>
    <div class="callback__side-text">
      Мир. дружба. жвачка.
    </div>
  </div>
  <div class="callback__inner">

    <div class="general__head">
      <div class="general__suptitle">
        УЗЕЛ СВЯЗИ
      </div>
      <div class="general__title">
        «ДРУЖБА»
      </div>
    </div>

    <form class="form" action="">
      <div class="form-inner">
        <div class="form-body">
          <div class="form-group">
            <input id="callback_name_input" class="form-input" type="text" name="names">
            <label class="form-label">
              <!-- Имя субъекта -->

              <div class="typewriter" data-sync-group="callback" data-type-speed="0.07" data-type-variance="0.04" data-delete-speed="0.04"
                data-pause-after-type="2.0" data-pause-after-delete="0.5" data-input="#callback_name_input"
                data-stop-text="Имя субъекта">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Давай знакомиться!|Сюда писать имя"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <div class="form-group">
            <input id="callback_tel_input" class="form-input" type="tel" name="tel">
            <label class="form-label">
              <!-- КАНАЛ СВЯЗИ -->

              <div class="typewriter" data-sync-group="callback" data-type-speed="0.07" data-type-variance="0.04" data-delete-speed="0.04"
                data-pause-after-type="2.0" data-pause-after-delete="0.5" data-input="#callback_tel_input"
                data-stop-text="КАНАЛ СВЯЗИ">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="Номер телефона|Можно указать почту|Ждем обращения)"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <div class="form-group">
            <input id="callback_comments_input" class="form-input" type="text" name="comments">
            <label class="form-label">
              <!-- СУТЬ ОБРАЩЕНИЯ -->

              <div class="typewriter" data-sync-group="callback" data-type-speed="0.07" data-type-variance="0.04" data-delete-speed="0.04"
                data-pause-after-type="2.0" data-pause-after-delete="0.5" data-input="#callback_comments_input"
                data-stop-text="СУТЬ ОБРАЩЕНИЯ">
                <div class="typewriter__line">
                  <span class="typewriter__word" data-words="суть нашего разговора|главная идея моего сообщения|основная цель"></span>
                </div>
                <span class="typewriter__cursor">|</span>
              </div>

            </label>
          </div>
          <!-- <div class="form-group">
            <textarea class="form-textarea" rows="1" name="commentss"></textarea>
            <label class="form-label">
              СУТЬ ОБРАЩЕНИЯ
            </label>
          </div> -->
        </div>
        <div class="form-foot">
          <button class="form-btn" type="button" data-btn-sound="poehali">
            поехали!
          </button>
          <div class="form-wrap">
            <div class="form-text">
              Нажимая на кнопку «Отправить» вы соглашаетесь с <a href="/">Политикой обработки персональных данных</a>
            </div>
            <div class="form-group">
              <input id="form-checkbox-1" class="form-checkbox" type="checkbox" data-btn-sound="shutdown_sound">
              <label for="form-checkbox-1" class="form-checkbox-label">
                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на обработку персональных данных
                </div>
              </label>
            </div>
            <div class="form-group">
              <input id="form-checkbox-2" class="form-checkbox" type="checkbox" data-btn-sound="shutdown_sound">
              <label for="form-checkbox-2" class="form-checkbox-label">
                <div class="form-checkbox--item"></div>
                <div class="form-text">
                  Я согласен на рекламные уведомления
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="callback__cover">
      <div class="callback__cover-img callback__cover-img--first" data-callback-anim="fadeDown">
        <img src="./../../images/temp/callback-ruka.png" alt="">
      </div>
      <div class="callback__cover-img callback__cover-img--second" data-callback-anim="fadeUp">
        <img src="./../../images/temp/callback-syrok.png" alt="">
      </div>
    </div>

    <div class="callback__btn">
      <span class="callback__btn-line callback__btn-line--first"></span>
      <span class="callback__btn-line callback__btn-line--second"></span>
    </div>

  </div>
</div>
