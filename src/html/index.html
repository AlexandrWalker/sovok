<!DOCTYPE html>
<html lang="ru" class="main-page">
@@include('blocks/head.html', {"title": "СОВОК"})

<body>
  <div class="wrapper">
    <!-- Шапка -->
    @@include('./blocks/header.html')
    <!-- Меню -->
    @@include('./blocks/menu.html')
    <!-- callback -->
    @@include('./blocks/callback.html')
    <main class="main">

      <section class="hero">
        <div class="container">
          <div class="hero__inner">

            <div class="hero__content">
              <h1 style="display: none;">за! уровень в цифре</h1>

              <div class="hero__suptitle">
                без права <br>
                на посредственность
              </div>
              <div class="hero__title">
                <div class="hero__title-line">
                  <span class="hero__title-word" data-word="за!"></span>
                </div>
                <div class="hero__title-line">
                  <span class="hero__title-word" data-word="уровень"></span>
                </div>
                <div class="hero__title-line">
                  <span class="hero__title-word" data-word="в"></span>
                  <span class="hero__title-word" data-word="цифре"></span>
                  <span class="hero__title-cursor">|</span>
                </div>
              </div>
            </div>
            <div class="hero__cover">
              <img src="./../images/temp/hero-cover.png" alt="">
            </div>
            <div class="hero__mask">
              <img src="./../images/mask/mask-hero.svg" alt="">
            </div>

          </div>
        </div>
      </section>

      <section>
        <div class="container">
          <div class="inner">
            
          </div>
        </div>
      </section>

      <section class="inform sound-section" data-scroll-sound="levitan" data-animate>
        <div class="container">
          <div class="inform__inner">

            <div class="inform__cover">
              <img src="./../images/temp/rupor.png" alt="">
            </div>

            <div class="inform__cover-active sound-image">
              <img src="./../images/temp/rupor-active.png" alt="">
            </div>

          </div>
        </div>
      </section>

    </main>
    <!-- Подвал -->
    @@include('blocks/footer.html')
